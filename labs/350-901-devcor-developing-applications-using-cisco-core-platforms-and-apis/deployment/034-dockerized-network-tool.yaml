lab:
  title: Dockerized Network Tool
  description: 350-901 DEVCOR - Developing Applications Using Cisco Core Platforms
    and APIs scenario-based CML lab.
  notes: '350-901 DEVCOR scenario lab: Dockerized Network Tool


    Lab type: scenario


    Scenario:

    You are taking over a partially built network. Use the topology, startup configs,
    and this note as the work order.


    Objectives:

    - Package a network validation tool conceptually.

    - Define environment variables and secrets.

    - Run validation against the simulated devices.


    Suggested verification:

    - show ip interface brief

    - show ip route

    - show running-config


    Stretch goals:

    - Document the final design.

    - Add one extra validation command for each requirement.

    - Make one controlled change and prove that the network still works.'
nodes:
- id: n0
  label: DEVBOX
  node_definition: desktop
  configuration: '# DEVBOX

    # Use this node as a lightweight endpoint or API/mock server.

    '
- id: n1
  label: API-GW
  node_definition: desktop
  configuration: '# API-GW

    # Use this node as a lightweight endpoint or API/mock server.

    '
- id: n2
  label: R1
  node_definition: iosv
  configuration: "hostname R1\nno ip domain-lookup\nip domain-name cml.local\nusername\
    \ admin privilege 15 secret cisco123\ncrypto key generate rsa modulus 1024\nline\
    \ vty 0 4\n login local\n transport input ssh\ninterface GigabitEthernet0/0\n\
    \ description Lab transit segment A\n ip address 10.10.0.1 255.255.255.0\n no\
    \ shutdown\ninterface GigabitEthernet0/1\n description Lab transit segment B\n\
    \ ip address 10.10.1.1 255.255.255.0\n no shutdown\ninterface Loopback0\n ip address\
    \ 172.16.1.1 255.255.255.255\n"
- id: n3
  label: R2
  node_definition: iosv
  configuration: "hostname R2\nno ip domain-lookup\nip domain-name cml.local\nusername\
    \ admin privilege 15 secret cisco123\ncrypto key generate rsa modulus 1024\nline\
    \ vty 0 4\n login local\n transport input ssh\ninterface GigabitEthernet0/0\n\
    \ description Lab transit segment A\n ip address 10.11.0.1 255.255.255.0\n no\
    \ shutdown\ninterface GigabitEthernet0/1\n description Lab transit segment B\n\
    \ ip address 10.11.1.1 255.255.255.0\n no shutdown\ninterface Loopback0\n ip address\
    \ 172.16.2.1 255.255.255.255\n"
- id: n4
  label: MGMT-SW
  node_definition: iosvl2
  configuration: "hostname SW1\nno ip domain-lookup\nvlan 20\n name USERS_20\nvlan\
    \ 30\n name SERVICES_30\ninterface range GigabitEthernet0/0-3\n switchport mode\
    \ access\n spanning-tree portfast\n"
links:
