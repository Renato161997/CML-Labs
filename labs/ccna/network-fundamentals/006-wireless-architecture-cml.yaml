lab:
  title: Wireless Architecture Scenario
  description: CCNA CML lab generated from blueprint coverage.
  notes: 'CCNA blueprint lab: Wireless Architecture Scenario


    Topics:

    - AP modes

    - controller-based networking

    - WLAN components


    Suggested tasks:

    1. Use notes to identify CAPWAP/control/data roles

    2. Map wired dependencies for AP reachability


    Suggested verification:

    - show ip interface brief

    - show interfaces status

    - show ip route

    - show running-config | section router

    - ping between the lab endpoints'
  version: 0.2.0
nodes:
- id: n0
  label: R1
  node_definition: iosv
  x: -200
  y: 0
  configuration: "hostname R1\nno ip domain-lookup\nbanner motd ^C CCNA Wireless Architecture Scenario ^C\ninterface GigabitEthernet0/0\n\
    \ description CCNA Wireless Architecture Scenario\n ip address 10.10.10.1 255.255.255.0\n no shutdown\nend"
- id: n1
  label: SW1
  node_definition: iosvl2
  x: 0
  y: 0
  configuration: "hostname SW1\nno ip domain-lookup\nbanner motd ^C CCNA Wireless Architecture Scenario ^C\nvlan 10\n name\
    \ USERS\nvlan 20\n name SERVICES\nvlan 99\n name MGMT\ninterface range GigabitEthernet0/1-3\n switchport mode access\n\
    \ spanning-tree portfast\nend"
- id: n2
  label: DEVBOX
  node_definition: desktop
  x: 200
  y: 0
links:
- id: l0
  n1: n0
  i1: 0
  n2: n1
  i2: 0
- id: l1
