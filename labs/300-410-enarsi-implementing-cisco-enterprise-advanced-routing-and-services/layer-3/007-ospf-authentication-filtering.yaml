lab:
  title: OSPF Authentication Filtering
  description: 300-410 ENARSI - Implementing Cisco Enterprise Advanced Routing and Services importable CML topology.
  notes: '300-410 ENARSI blueprint lab: OSPF Authentication Filtering


    Topics:

    - OSPF authentication

    - prefix filtering


    Tasks:

    1. Authenticate neighbors

    2. Filter selected routes

    3. Confirm LSDB impact


    Useful checks:

    - show ip interface brief

    - show running-config

    - show ip route

    - show ip protocols

    - ping and traceroute between endpoints'
  version: 0.2.0
nodes:
- id: n0
