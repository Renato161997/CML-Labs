lab:
  title: Summarization And Filtering Faults
  description: 300-410 ENARSI - Implementing Cisco Enterprise Advanced Routing and
    Services scenario-based CML lab.
  notes: '300-410 ENARSI scenario lab: Summarization And Filtering Faults


    Lab type: break/fix


    Scenario:

    You are taking over a partially built network. Use the topology, startup configs,
    and this note as the work order.


    Objectives:

    - Find an over-aggressive summary or filter.

    - Restore missing remote prefixes.

    - Keep the routing table smaller than the unfiltered design.


    Suggested verification:

    - show ip interface brief

    - show ip route

    - show running-config


    Stretch goals:

    - Document the final design.

    - Add one extra validation command for each requirement.

    - Make one controlled change and prove that the network still works.'
