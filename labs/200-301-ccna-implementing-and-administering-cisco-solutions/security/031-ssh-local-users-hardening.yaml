lab:
  title: SSH Local Users Hardening
  description: 200-301 CCNA - Implementing and Administering Cisco Solutions CML lab.
  notes: '200-301 CCNA blueprint lab: SSH Local Users Hardening


    Topics:

    - SSH

    - local users

    - device hardening


    Suggested tasks:

    1. Create user

    2. Enable SSH only

    3. Restrict VTY


    Suggested verification:

    - show ip interface brief

    - show interfaces status

    - show ip route

    - show running-config | section router

    - ping between the lab endpoints'
  version: 0.2.0
nodes:
- id: n0
  label: R1
  node_definition: iosv
  x: 0
  y: 0
  configuration: "hostname R1\nno ip domain-lookup\nbanner motd ^C CCNA SSH Local Users Hardening ^C\ninterface GigabitEthernet0/0\n\
    \ description CCNA SSH Local Users Hardening\n ip address 10.0.1.1 255.255.255.0\n no shutdown\nend"
- id: n1
  label: PC1
  node_definition: desktop
  x: -200
  y: 0
links:
- id: l0
  n1: n0
  i1: 0
  n2: n1
  i2: 0
