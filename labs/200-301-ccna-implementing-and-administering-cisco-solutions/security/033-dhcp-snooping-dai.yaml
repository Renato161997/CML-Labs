lab:
  title: DHCP Snooping And DAI
  description: 200-301 CCNA - Implementing and Administering Cisco Solutions CML lab.
  notes: '200-301 CCNA blueprint lab: DHCP Snooping And DAI


    Topics:

    - DHCP snooping

    - Dynamic ARP Inspection


    Suggested tasks:

    1. Trust uplink

    2. Protect access ports

    3. Verify binding table


    Suggested verification:

    - show ip interface brief

    - show interfaces status

    - show ip route

    - show running-config | section router

    - ping between the lab endpoints'
  version: 0.2.0
nodes:
- id: n0
  label: R1
  node_definition: iosv
  x: 0
  y: -180
  configuration: "hostname R1\nno ip domain-lookup\nbanner motd ^C CCNA DHCP Snooping And DAI ^C\ninterface GigabitEthernet0/0\n\
    \ description CCNA DHCP Snooping And DAI\n ip address 10.0.0.1 255.255.255.252\n no shutdown\nend"
