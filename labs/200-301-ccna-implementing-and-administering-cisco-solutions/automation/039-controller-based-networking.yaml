lab:
  title: Controller Based Networking
  description: 200-301 CCNA - Implementing and Administering Cisco Solutions CML lab.
  notes: '200-301 CCNA blueprint lab: Controller Based Networking


    Topics:

    - controller-based networking

    - northbound APIs


    Suggested tasks:

    1. Identify controller roles

    2. Separate control and data plane


    Suggested verification:

    - show ip interface brief

    - show interfaces status

    - show ip route

    - show running-config | section router

    - ping between the lab endpoints'
  version: 0.2.0
nodes:
- id: n0
  label: R1
  node_definition: iosv
  x: -200
  y: 0
  configuration: "hostname R1\nno ip domain-lookup\nbanner motd ^C CCNA Controller Based Networking ^C\ninterface GigabitEthernet0/0\n\
    \ description CCNA Controller Based Networking\n ip address 10.10.10.1 255.255.255.0\n no shutdown\nend"
- id: n1
  label: SW1
  node_definition: iosvl2
  x: 0
  y: 0
  configuration: "hostname SW1\nno ip domain-lookup\nbanner motd ^C CCNA Controller Based Networking ^C\nvlan 10\n name USERS\n\
    vlan 20\n name SERVICES\nvlan 99\n name MGMT\ninterface range GigabitEthernet0/1-3\n switchport mode access\n spanning-tree\
    \ portfast\nend"
- id: n2
  label: DEVBOX
  node_definition: desktop
  x: 200
  y: 0
links:
- id: l0
  n1: n0
  i1: 0
  n2: n1
  i2: 0
- id: l1
  n1: n1
  i1: 1
  n2: n2
  i2: 0
