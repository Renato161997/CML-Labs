lab:
  title: IP SLA Tracking Static Route
  description: 200-301 CCNA - Implementing and Administering Cisco Solutions CML lab.
  notes: '200-301 CCNA blueprint lab: IP SLA Tracking Static Route


    Topics:

    - IP SLA

    - tracking

    - static route


    Suggested tasks:

    1. Configure IP SLA

    2. Track route reachability

    3. Fail over route


    Suggested verification:

    - show ip interface brief

    - show interfaces status

    - show ip route

    - show running-config | section router

    - ping between the lab endpoints'
  version: 0.2.0
nodes:
- id: n0
  label: R1
  node_definition: iosv
  x: -300
  y: 0
  configuration: "hostname R1\nno ip domain-lookup\nbanner motd ^C CCNA IP SLA Tracking Static Route ^C\ninterface GigabitEthernet0/0\n\
    \ description CCNA IP SLA Tracking Static Route\n ip address 10.0.12.1 255.255.255.252\n no shutdown\ninterface Loopback0\n\
    \ description CCNA IP SLA Tracking Static Route\n ip address 10.1.1.1 255.255.255.255\n no shutdown\nend"
- id: n1
  label: R2
  node_definition: iosv
  x: 0
  y: 0
  configuration: "hostname R2\nno ip domain-lookup\nbanner motd ^C CCNA IP SLA Tracking Static Route ^C\ninterface GigabitEthernet0/0\n\
    \ description CCNA IP SLA Tracking Static Route\n ip address 10.0.12.2 255.255.255.252\n no shutdown\ninterface GigabitEthernet0/1\n\
    \ description CCNA IP SLA Tracking Static Route\n ip address 10.0.23.1 255.255.255.252\n no shutdown\nend"
- id: n2
  label: R3
  node_definition: iosv
  x: 300
  y: 0
  configuration: "hostname R3\nno ip domain-lookup\nbanner motd ^C CCNA IP SLA Tracking Static Route ^C\ninterface GigabitEthernet0/0\n\
    \ description CCNA IP SLA Tracking Static Route\n ip address 10.0.23.2 255.255.255.252\n no shutdown\ninterface Loopback0\n\
    \ description CCNA IP SLA Tracking Static Route\n ip address 10.3.3.3 255.255.255.255\n no shutdown\nend"
