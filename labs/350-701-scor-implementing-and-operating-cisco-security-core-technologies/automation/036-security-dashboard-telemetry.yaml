lab:
  title: Security Dashboard Telemetry
  description: 350-701 SCOR - Implementing and Operating Cisco Security Core Technologies importable CML topology.
  notes: '350-701 SCOR blueprint lab: Security Dashboard Telemetry


    Topics:

    - dashboard

    - telemetry

    - visibility


    Tasks:

    1. Collect metrics

    2. Render dashboard

    3. Alert on policy drift


    Useful checks:

    - show ip interface brief

    - show running-config

    - show ip route

    - show ip protocols

    - ping and traceroute between endpoints'
  version: 0.2.0
nodes:
- id: n0
  label: R1
  node_definition: iosv
  x: -180
  y: 0
  configuration: "hostname R1\nno ip domain-lookup\nbanner motd ^C SECCORE-SCOR Security Dashboard Telemetry ^C\ninterface\
    \ GigabitEthernet0/0\n description SECCORE-SCOR Security Dashboard Telemetry\n ip address 10.255.0.1 255.255.255.0\n no\
    \ shutdown\ninterface Loopback0\n description SECCORE-SCOR Security Dashboard Telemetry\n ip address 10.255.255.1 255.255.255.255\n\
    \ no shutdown\nend"
- id: n1
  label: DEVBOX
  node_definition: desktop
  x: 180
  y: 0
- id: n2
  label: API-TARGET
  node_definition: iosv
  x: 0
  y: 160
  configuration: "hostname API-TARGET\nno ip domain-lookup\nbanner motd ^C SECCORE-SCOR Security Dashboard Telemetry ^C\n\
    interface GigabitEthernet0/0\n description SECCORE-SCOR Security Dashboard Telemetry\n ip address 10.255.0.2 255.255.255.0\n\
    \ no shutdown\nend"
links:
- id: l0
  n1: n0
  i1: 0
  n2: n1
  i2: 0
- id: l1
  n1: n0
  i1: 1
  n2: n2
  i2: 0
