lab:
  title: Guest Access Isolation
  description: 350-701 SCOR - Implementing and Operating Cisco Security Core Technologies importable CML topology.
  notes: '350-701 SCOR blueprint lab: Guest Access Isolation


    Topics:

    - guest access

    - isolation


    Tasks:

    1. Create guest VLAN

    2. Deny internal access

    3. Allow internet path


    Useful checks:

    - show ip interface brief

    - show running-config

    - show ip route

    - show ip protocols

    - ping and traceroute between endpoints'
  version: 0.2.0
nodes:
- id: n0
  label: SW1
  node_definition: iosvl2
  x: 0
  y: 0
  configuration: "hostname SW1\nno ip domain-lookup\nbanner motd ^C SECCORE-SCOR Guest Access Isolation ^C\nvlan 10\n name\
    \ USERS\nvlan 20\n name SERVERS\nvlan 30\n name GUEST\nvlan 99\n name MGMT\ninterface range GigabitEthernet0/1-3\n switchport\
    \ mode access\n spanning-tree portfast\nend"
- id: n1
  label: PC1
  node_definition: desktop
  x: -180
  y: 160
- id: n2
  label: PC2
  node_definition: desktop
  x: 180
  y: 160
links:
- id: l0
  n1: n0
  i1: 1
  n2: n1
  i2: 0
- id: l1
  n1: n0
  i1: 2
  n2: n2
  i2: 0
