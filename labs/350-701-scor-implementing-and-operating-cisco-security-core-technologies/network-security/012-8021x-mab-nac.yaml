lab:
  title: 802.1X MAB NAC
  description: 350-701 SCOR - Implementing and Operating Cisco Security Core Technologies importable CML topology.
  notes: '350-701 SCOR blueprint lab: 802.1X MAB NAC


    Topics:

    - 802.1X

    - MAB

    - NAC


    Tasks:

    1. Model access session

    2. Define fallback

    3. Verify port state


    Useful checks:

    - show ip interface brief

    - show running-config

    - show ip route

    - show ip protocols

    - ping and traceroute between endpoints'
  version: 0.2.0
nodes:
- id: n0
  label: SW1
  node_definition: iosvl2
  x: 0
  y: 0
  configuration: "hostname SW1\nno ip domain-lookup\nbanner motd ^C SECCORE-SCOR 802.1X MAB NAC ^C\nvlan 10\n name USERS\n\
    vlan 20\n name SERVERS\nvlan 30\n name GUEST\nvlan 99\n name MGMT\ninterface range GigabitEthernet0/1-3\n switchport mode\
    \ access\n spanning-tree portfast\nend"
- id: n1
  label: PC1
  node_definition: desktop
  x: -180
  y: 160
- id: n2
  label: PC2
  node_definition: desktop
  x: 180
  y: 160
links:
- id: l0
  n1: n0
  i1: 1
  n2: n1
  i2: 0
- id: l1
  n1: n0
  i1: 2
  n2: n2
  i2: 0
